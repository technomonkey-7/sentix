[server]
# Disables file watching of database/data files, which prevents Streamlit from hanging
# on Ctrl-C and avoids file-system lock contentions on Windows with SQLite.
fileWatcherType = "none"

[theme]
base = "dark"
primaryColor = "#00D18F"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#131A22"
textColor = "#E6EDF3"
font = "sans serif"
